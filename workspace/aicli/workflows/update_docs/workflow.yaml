name: update_docs
description: "Update PROJECT.md from session log + memory; then capture session summary"
max_iterations: 1

steps:
  - name: capture_session
    provider: claude
    role: prompts/roles/architect.md
    prompt: prompts/maintenance/session_capture.md
    inject_input: true
    inject_files:
      - PROJECT.md
    inject_context:
      - memory

  - name: update_project_md
    provider: claude
    role: prompts/roles/architect.md
    prompt: prompts/maintenance/status_update.md
    inject_previous_output: true
    inject_files:
      - PROJECT.md
      - history/session_log.jsonl
    inject_context:
      - memory

provider_config:
  claude:
    max_retries: 2
