name: PM → Dev → Reviewer
description: Standard feature pipeline with approval gate
max_iterations: 5
log_directory: ''
nodes:
- name: Product Manager
  provider: claude
  inputs:
  - name: prompt
    type: prompt
  outputs:
  - name: spec.md
    type: md
  success_criteria: reviewer_approved
- name: Developer
  provider: claude
  inputs:
  - name: spec.md
    type: md
  outputs:
  - name: code
    type: code
  - name: github_pr
    type: github
  success_criteria: tests_pass
- name: Reviewer
  provider: claude
  stateless: true
  inputs:
  - name: code
    type: code
  - name: spec.md
    type: md
  outputs:
  - name: feedback.md
    type: feedback
  - name: approved
    type: score
  success_criteria: approved == true
