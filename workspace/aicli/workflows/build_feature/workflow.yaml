name: build_feature
description: "Design with Claude → Implement with Claude → Review with DeepSeek"
max_iterations: 3

pre_actions:
  - git_pull

post_actions:
  - git_commit
  - git_push

steps:
  - name: design
    provider: claude
    role: prompts/roles/architect.md
    prompt: prompts/01_design.md
    inject_input: true
    inject_files:
      - PROJECT.md
      - "{{code_dir}}/aicli.yaml"
    inject_context:
      - memory
      - summary

  - name: implement
    provider: claude
    role: prompts/roles/architect.md
    prompt: prompts/02_implement.md
    inject_previous_output: true
    inject_files:
      - "{{code_dir}}/providers/"
      - "{{code_dir}}/core/"
      - auto

  - name: review
    provider: deepseek
    role: prompts/roles/reviewer.md
    prompt: prompts/03_review.md
    inject_previous_output: true
    output_format: json
    produces:
      score: int
      issues: list
      approved: bool
    on_fail:
      loop_to: implement
    on_pass:
      next: end

stop_condition:
  type: score
  field: score
  threshold: 8

provider_config:
  deepseek:
    fallback: openai
    max_retries: 3
  claude:
    max_retries: 2
