name: health_review
description: "Weekly project health check: status, gaps, debt, priorities, risks"
max_iterations: 1

steps:
  - name: review
    provider: claude
    role: prompts/roles/architect.md
    prompt: prompts/maintenance/history_review.md
    inject_input: false
    inject_files:
      - PROJECT.md
      - history/session_log.jsonl
    inject_context:
      - memory

provider_config:
  claude:
    max_retries: 2
