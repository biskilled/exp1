name: "python_api"
version: "1.0"
description: |
  FastAPI feature pipeline: PM → Architect → Backend Developer → Reviewer.
  Designed for Python/FastAPI projects: thin routers, Pydantic v2, async endpoints.

stages:
  - key: "project_manager"
    role: "Product Manager"
    description: "Clarify endpoint requirements, request/response schema, error cases"

  - key: "architect"
    role: "Sr. Architect"
    description: "Design router structure, Pydantic models, dependencies, DB layer"

  - key: "developer"
    role: "Backend Developer"
    description: "Implement endpoint — thin router, fat service, full type hints, async"

  - key: "reviewer"
    role: "Code Reviewer"
    description: "Verify Pydantic schema, error handling, tests present, no raw SQL"

on_rejection:
  loops_back_to: "developer"
  max_retries: 2

on_completion:
  save_memory: true
