name: "standard"
version: "1.0"
description: |
  Full PM → Architect → Developer → Reviewer pipeline.
  Reviewer rejection loops back to Developer (up to max_rejection_retries times).

# Each stage key maps to a role name in mng_agent_roles.
# Stages execute in order; each stage receives the previous stage's structured output as handoff.
#
# Optional per-stage overrides (all optional — omit to use role defaults):
#   retry: 2                    # retry stage this many times on error (default: 1 = no retry)
#   timeout_seconds: 120        # abort stage if it takes longer than this
#   temperature_override: 0.1   # override role's temperature for this stage only
#   max_iterations_override: 5  # override role's max_iterations for this stage only
stages:
  - key: "project_manager"
    role: "Product Manager"
    description: "Break task into work items, query memory, identify risks"

  - key: "architect"
    role: "Sr. Architect"
    description: "Design approach, verify file structure, flag conflicts"

  - key: "developer"
    role: "Web Developer"
    description: "Implement spec; read → write → verify each file"

  - key: "reviewer"
    role: "Code Reviewer"
    description: "Read actual diff; verify each acceptance criterion; approve or reject"

# Rejection handling: reviewer verdict "rejected" or "needs_changes" loops back
on_rejection:
  loops_back_to: "developer"   # stage key to re-run
  max_retries: 2               # total re-runs before giving up

# Post-run actions
on_completion:
  save_memory: true            # persist full workflow result to pr_prompts
