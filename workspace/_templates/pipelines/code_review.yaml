name: "code_review"
version: "1.0"
description: |
  Web Developer (prep) → Code Reviewer (deep review) pipeline.
  Produces a checklist then a scored JSON review.

stages:
  - key: "prep"
    role: "Web Developer"
    description: "Survey recently changed files and produce a review checklist"
    task_prompt: |
      Review the recently changed files listed above. For each file:

      1. Summarise what the file does in one sentence
      2. List the key functions/classes and what they do
      3. Identify any potential issues (bugs, style, missing error handling)

      Output a structured markdown checklist that the deep reviewer can use.
      Focus on: correctness, security, Python idioms, type safety.
    result_field: "checklist"

  - key: "reviewer"
    role: "Code Reviewer"
    description: "Deep review using the checklist; returns scored JSON"
    task_prompt: |
      Using the checklist above as a guide, perform a thorough code review.

      Focus on:
      - Bugs and logic errors
      - Security vulnerabilities (injection, path traversal, secret exposure)
      - Performance issues
      - Missing type hints or incorrect types
      - Unnecessary complexity

      Output ONLY valid JSON:
      {
        "score": 7,
        "approved": false,
        "issues": ["description of each issue with file:line reference if possible"],
        "summary": "Overall assessment in 2-3 sentences."
      }

      Score 1-10. Approved if score >= 8.
    result_field: "review"

on_completion:
  save_memory: true
