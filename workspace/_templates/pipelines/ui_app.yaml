name: "ui_app"
version: "1.0"
description: |
  UI component pipeline: PM → Architect → Frontend Developer → Reviewer.
  Designed for web UI projects: components, state, accessibility, cross-browser.

stages:
  - key: "project_manager"
    role: "Product Manager"
    description: "Define component requirements, user interactions, acceptance criteria"

  - key: "architect"
    role: "Sr. Architect"
    description: "Design component API surface, state management, data flow"

  - key: "developer"
    role: "Frontend Developer"
    description: "Implement component — correct props, events, accessibility, responsive"

  - key: "reviewer"
    role: "Code Reviewer"
    description: "Verify visual correctness, accessibility, edge cases, no regressions"

on_rejection:
  loops_back_to: "developer"
  max_retries: 2

on_completion:
  save_memory: true
