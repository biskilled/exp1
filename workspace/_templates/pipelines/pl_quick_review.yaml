name: "quick_review"
version: "1.0"
description: |
  Lightweight pipeline: Developer + Reviewer only.
  Use when the task is already specified — no PM or Architect needed.

stages:
  - key: "developer"
    role: "Web Developer"
    description: "Implement the given spec"

  - key: "reviewer"
    role: "Code Reviewer"
    description: "Review implementation against provided acceptance criteria"

on_rejection:
  loops_back_to: "developer"
  max_retries: 1

on_completion:
  save_memory: true
