name: "trading_strategy"
version: "1.0"
description: |
  Quantitative strategy pipeline: PM → Architect → Developer → Reviewer.
  Designed for quant/notebook projects: no look-ahead bias, transaction costs, statistical validity.

stages:
  - key: "project_manager"
    role: "Product Manager"
    description: "Define strategy hypothesis, target Sharpe, allowed instruments and timeframe"

  - key: "architect"
    role: "Sr. Architect"
    description: "Design signal pipeline, data sources, backtest framework, risk controls"

  - key: "developer"
    role: "Backend Developer"
    description: "Implement strategy — no look-ahead bias, include transaction costs, document assumptions"

  - key: "reviewer"
    role: "Code Reviewer"
    description: "Verify statistical validity, backtest integrity, Sharpe > 1, no overfitting"

on_rejection:
  loops_back_to: "developer"
  max_retries: 2

on_completion:
  save_memory: true
