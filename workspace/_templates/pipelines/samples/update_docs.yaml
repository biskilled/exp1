name: "update_docs"
version: "1.0"
description: |
  Single-stage pipeline: Web Developer updates PROJECT.md from recent memory and user input.

stages:
  - key: "writer"
    role: "Web Developer"
    description: "Update PROJECT.md using recent memory entries and user input"
    task_prompt: |
      You are updating this project's living documentation file (PROJECT.md).

      Using:
      - The current PROJECT.md (injected above)
      - Recent memory entries (injected above)
      - Any new information from the user input

      Produce an updated PROJECT.md that:

      1. Marks completed features as [x]
      2. Adds new features/modules that were implemented
      3. Updates the Recent Changes table (keep last 10 rows)
      4. Updates TODO list (remove done items, reorder by priority)
      5. Preserves all section headings and structure
      6. Updates Open Questions if any were resolved

      Output ONLY the complete updated PROJECT.md content (no commentary before or after).
      Start with `# <ProjectName> — Project Knowledge Base`.
    result_field: "updated_docs"

on_completion:
  save_memory: false
