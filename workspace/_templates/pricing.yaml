# LLM Provider Pricing — per-token costs (USD/token)
#
# Used as the default fallback when no DB-stored configuration exists.
# Admins can override these values via Admin → Provider Costs in the UI.
# Prices are per individual token, not per 1M tokens.
#
# Formula: cost = (input_tokens * input_price) + (output_tokens * output_price)

claude:
  claude-sonnet-4-6:
    input:  0.000003      # $3.00 / 1M tokens
    output: 0.000015      # $15.00 / 1M tokens
  claude-opus-4-6:
    input:  0.000015      # $15.00 / 1M tokens
    output: 0.000075      # $75.00 / 1M tokens
  claude-haiku-4-5-20251001:
    input:  0.0000008     # $0.80 / 1M tokens
    output: 0.000004      # $4.00 / 1M tokens
  claude-haiku-3-5:
    input:  0.0000008
    output: 0.000004

