# Canonical pipeline: workspace/_templates/pipelines/code_review.yaml
name: code_review
description: "Auto code review for FastAPI changes"
max_iterations: 1

steps:
  - name: review
    provider: deepseek
    prompt: prompts/01_review.md
    inject_input: true
    inject_files:
      - auto
    output_format: json
    produces:
      score: int
      issues: list
      approved: bool

provider_config:
  deepseek:
    fallback: openai
    max_retries: 3
