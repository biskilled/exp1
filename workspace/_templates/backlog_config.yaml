# backlog_config.yaml — project-level overrides only
#
# This file overrides defaults from backend/prompts/backlog.yaml.
# Only add keys you want to change for this project.
# Prompt definitions (grouping_prompt, summary_prompt, etc.) belong
# in backend/prompts/backlog.yaml — do NOT duplicate them here.

# Maximum number of use-case groups the LLM may create in one full-digest pass.
max_groups: 7

# Target max approved use cases before classify stops creating new ones.
# 0 = no limit (read from classify call's max_use_cases param).
max_use_cases: 0
