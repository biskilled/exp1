# backlog_config.yaml — Backlog pipeline configuration
#
# ============================================================================
# HOW THE PIPELINE WORKS  (read this top-to-bottom)
# ============================================================================
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  STEP 1 — RAW CAPTURE  (automatic, no config needed)                   │
# │                                                                         │
# │  Every time an event happens it is saved to a mirror table:             │
# │    mem_mrr_prompts   ← every Claude Code / CLI prompt + response        │
# │    mem_mrr_commits   ← every git commit pushed via the backend          │
# │    mem_mrr_items     ← documents or meeting notes added via API         │
# │    mem_mrr_messages  ← Slack / chat messages imported via API           │
# │                                                                         │
# │  Each row starts with  backlog_ref = NULL  (not yet digested).          │
# └─────────────────────────────────────────────────────────────────────────┘
#          ↓
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  STEP 2 — MIRROR EVENT SUMMARY  (automatic, threshold-based, 2 calls)  │
# │                                                                         │
# │  After every new row is saved, the system counts how many rows for      │
# │  that source still have  backlog_ref = NULL.                            │
# │  When the count reaches the  cnt  threshold, two LLM calls are made:   │
# │                                                                         │
# │  CALL 2a — GROUPING  (grouping_prompt below)                           │
# │    Input:  all cnt pending rows + list of all active planner_tags       │
# │            (slugs + categories + descriptions) for tag matching         │
# │    Output: JSON array of groups, each group =                           │
# │      { "event_indices": [0,1,2], "slug": "auth-refactor",              │
# │        "slug_type": "existing|new", "classify": "bug|feature|task",    │
# │        "topic": "one-line description of this group",                   │
# │        "user_tags": ["development","feature:auth"],                     │
# │        "ai_existing_tags": [{"category":"feature","name":"auth-refactor"}], │
# │        "ai_new_tags": [{"category":"task","name":"token-refresh"}] }    │
# │    user_tags: collected from raw event.tags JSON fields                 │
# │    ai_existing_tags: max 1 per category, must match an existing tag     │
# │    ai_new_tags: max 1 per category, suggested new tag name              │
# │                                                                         │
# │  CALL 2b — SUMMARIZATION  (summary_prompt below, one call per group)   │
# │    Input:  events in this group only + linked commits + commit_code     │
# │    Output for PROMPT events (P-series: P100001 …):                     │
# │      requirements (user requests), deliveries (what was done, with      │
# │      file/class/method refs from linked commit_code), action_items      │
# │      (open tasks with acceptance criteria), status, ai_score.           │
# │    Output for COMMIT events (C-series: C200001 …):                     │
# │      Only standalone commits (prompt_id IS NULL). Uses commit_code      │
# │      (file/class/method/lines) to infer deliveries.                     │
# │      Commits: status="completed", ai_score=5 always. AUTO-APPROVED.    │
# │      Commits touching only system files → silently skipped ('SKIP').   │
# │    Output for ITEM / MESSAGE events (I / M series):                    │
# │      Decisions made, requirements, deliveries, open action items.       │
# │                                                                         │
# │  For every source event one backlog ITEM is created with a ref ID.     │
# │  Events are stamped:  backlog_ref = 'P100001'  once processed.         │
# │                                                                         │
# │  GROUP section format (written to backlog.md, one section per cluster):│
# │    YY/MM/DD-HH:MM [ ] (source) — slug                                  │
# │    <!-- G_SLUG: auth-refactor -->                                       │
# │    <!-- G_TYPE: existing|new -->                                        │
# │    Total: 5 prompts · 2 commits · 0 messages · 0 items                 │
# │    User tags: development                                               │
# │    AI existing: [feature:auth-refactor] [phase:development]            │
# │    AI new: [task:token-refresh]                                         │
# │                                                                         │
# │      PROMPTS P100001 [ ] [feature] [in-progress] [3] — summary         │
# │        Requirements: user request 1; user request 2                    │
# │        Deliveries:   file/class/method changed                          │
# │                                                                         │
# │      COMMITS C200001 [+] [task] [completed] [5] — commit summary       │
# │        Deliveries:   file/class/method changed                          │
# │                                                                         │
# │    ---                                                                  │
# │                                                                         │
# │  Can also be triggered manually:                                        │
# │    POST /memory/{project}/sync-backlog                                  │
# │    POST /memory/{project}/sync-backlog?source=commits                   │
# └─────────────────────────────────────────────────────────────────────────┘
#          ↓  documents/backlog.md  (human-editable inbox)
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  STEP 3 — USER REVIEW  (manual, in the Backlog UI tab)                 │
# │                                                                         │
# │  GROUP level (use case cluster):                                        │
# │    [ ] in group header — approve/reject the use case (for new slugs)   │
# │    Use case name dropdown in UI: pick existing or create new            │
# │    AI tag chips: approve/reject ai_existing_tags and ai_new_tags        │
# │                                                                         │
# │  ITEM level (individual event):                                         │
# │    [ ] → [+] approve, [-] reject                                        │
# │    classify dropdown: bug | feature | task                              │
# │    status dropdown: completed | in-progress                             │
# │    ai_score: 0-5 (read-only, from LLM)                                 │
# │                                                                         │
# │  Commit items arrive pre-approved ([+]) — no action needed.            │
# │  Prompt/item/message items wait for user approval.                      │
# │  Before writing to use case file, near-duplicate slug detection runs.   │
# └─────────────────────────────────────────────────────────────────────────┘
#          ↓  user clicks "Process approved" (or POST /work-items/sync)
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  STEP 4 — MERGE INTO USE CASES  (triggered by user)                    │
# │                                                                         │
# │  Result per item approval state:                                        │
# │    [+] approved → merged into use case file, REMOVED from backlog.md   │
# │    [-] rejected → moved to >>>>>>> REJECTED <<<<<< section at bottom   │
# │                   of backlog.md (stays for audit, never deleted)        │
# │    [ ] pending  → stays in backlog.md pending section                  │
# │                                                                         │
# │  For every approved item:                                               │
# │                                                                         │
# │  4a. Similarity check on the slug:                                      │
# │        difflib ratio ≥ 0.85 → treat as spelling duplicate of existing  │
# │        ratio 0.65-0.85 → optional vector similarity check              │
# │        Below threshold → create new slug                                │
# │                                                                         │
# │  4b. Upsert  planner_tags  row (stable DB identity):                   │
# │        existing slug → use existing tag_id (no insert)                  │
# │        new slug     → INSERT planner_tags; flag creator='backlog_ai'   │
# │        category mapped from classify (see work_items section below)     │
# │        file_ref set to: "documents/use_cases/{slug}.md"                │
# │                                                                         │
# │  4c. Create or update  documents/use_cases/{slug}.md                   │
# │        New file created from workspace/_templates/use_cases/            │
# │          use_case_template.md (includes all section structure).         │
# │        classify=bug  → added under  ## Open Bugs  [ ] AI:N summary     │
# │        classify=task/feature → added under  ## Open Items              │
# │        Full event block appended inside:                                │
# │          <!-- EVENTS_START --> … <!-- EVENTS_END -->                    │
# │        Event block format:                                              │
# │          ### REF_ID · YY/MM/DD-HH:MM · SOURCE · classify · status · AI:N │
# │          summary                                                         │
# │          **Requirements:** req1; req2                                    │
# │          **Deliveries:** file/class changed                              │
# │          **Action items:** - item (acceptance: ...)                     │
# │        Header counters updated: EVENTS++, PROMPTS/COMMITS/etc.++       │
# │        UPDATED date refreshed to today.                                 │
# │                                                                         │
# │  4d. Insert  mem_backlog_links  rows (one per approved item):           │
# │        ref_id → use_case_slug + tag_id + classify + summary            │
# │        Permanent DB record — survives .md file edits or deletion.       │
# │        Rebuild Events section: POST /memory/{p}/regenerate-use-case     │
# │                                                                         │
# │  Query all source events for a use case:                                │
# │    GET /memory/{project}/use-case-events?slug=auth-refactor             │
# │  Rebuild Events section if accidentally deleted:                        │
# │    POST /memory/{project}/regenerate-use-case?slug=auth-refactor        │
# └─────────────────────────────────────────────────────────────────────────┘
#          ↓  use case files accumulate approved entries over time
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  STEP 5 — USE CASE REFRESH / LLM SUMMARY  (on-demand, per use case)   │
# │                                                                         │
# │  Two modes are available per use case:                                  │
# │                                                                         │
# │  refresh (no LLM call):                                                 │
# │    - Re-count total_events from mem_backlog_links                       │
# │    - Re-scan linked commits to update code stack + commit count          │
# │    - Re-copy raw event summaries into the ## Events section             │
# │    POST /memory/{project}/use-case/{slug}/refresh                       │
# │                                                                         │
# │  llm-summary (LLM call, uses llm_summary_prompt below):                │
# │    - Reads all events in ## Events section                              │
# │    - LLM rewrites: Summary, Requirements, Delivery, Completed, Open     │
# │    - Open items / bugs get an AI score 0-5 updated                      │
# │    POST /memory/{project}/use-case/{slug}/llm-summary                   │
# └─────────────────────────────────────────────────────────────────────────┘
#
# Runtime config location: {code_dir}/.ai/backlog_config.yaml
# (auto-copied from this template on first run if missing)
# ============================================================================

file_name: backlog.md
rotation: false   # true = daily rotation → backlog_2026-04-16.md

# ── Step 2 digest prompts ─────────────────────────────────────────────────────
# Each source type has two prompts:
#   grouping_prompt  — clusters N pending rows into topic groups (one LLM call)
#   summary_prompt   — summarizes each individual group (one call per group)
#
# Both prompts require these two fields in their output JSON:
#   slug      (use case slug — existing or new)
#   classify  (bug | feature | task)

mirroring_event_summary:

  prompts:
    cnt: 5
    grouping_prompt:
      desc: >
        You are grouping AI development session prompts (user ↔ assistant exchanges)
        into topic clusters. Each cluster should share a single use case and intent
        (bug fix, feature, or task).
        You receive: a numbered list of prompts/responses and a list of all existing
        active use case slugs with their descriptions.
        Return a JSON array of groups:
          [{"event_indices": [0,1,2], "slug": "auth-refactor",
            "slug_type": "existing|new", "classify": "bug|feature|task",
            "topic": "one-line group description"}]
        Rules:
          - Each event index must appear in exactly one group.
          - Prefer existing slugs over creating new ones.
          - Only create a new slug if no existing one is within 65% similarity.
          - A new slug must be lowercase-hyphenated (e.g. "stripe-billing").
          - classify is the dominant intent across all events in the group.
      llm: claude-haiku-4-5-20251001
      temperature: 0.2
    summary_prompt:
      desc: >
        You are summarizing a group of AI development session prompts (user ↔ assistant).
        The group includes the prompt text, assistant response, and any linked git commits
        with their code symbols (file path, class, method, lines added/removed).
        Extract and return JSON:
          {
            "requirements":  ["user request 1", "user request 2"],
            "deliveries":    ["what was done, referencing specific file/class/method names"],
            "action_items":  [{"desc": "...", "acceptance": "user accepts when ..."}],
            "status":        "completed|in-progress",
            "ai_score":      <0-5>
          }
        status: "completed" if all action items are done, "in-progress" otherwise.
        ai_score: 0=not started, 1=discussed, 2=design, 3=partially done, 4=implemented, 5=tested.
        If no LINKED COMMIT sections appear, deliveries = assistant-described work only.
        Keep each list item to one clear sentence. Be specific; avoid vague language.
      llm: claude-haiku-4-5-20251001
      temperature: 0.3

  commits:
    cnt: 5
    grouping_prompt:
      desc: >
        You are grouping standalone git commits (no user session — CI/CD, merges,
        direct pushes) into topic clusters by use case.
        You receive: a numbered list of commits (message + code symbols: file path,
        class, method, lines added/removed), a list of existing active use case slugs,
        and the planner tag list for tag matching.
        Return a JSON array of groups:
          [{"event_indices": [0,1], "slug": "auth-refactor",
            "slug_type": "existing|new", "classify": "bug|feature|task",
            "topic": "one-line group description",
            "user_tags": [],
            "ai_existing_tags": [{"category": "feature", "name": "auth-refactor"}],
            "ai_new_tags": []}]
        Commits touching only system files (CLAUDE.md, .cursorrules, MEMORY.md,
        package-lock.json, etc.) should be placed in a group with slug "SKIP".
        ai_existing_tags: max 1 per category, must exactly match an existing planner tag.
        ai_new_tags: max 1 per category, only if no existing tag matches.
      llm: claude-haiku-4-5-20251001
      temperature: 0.2
    summary_prompt:
      desc: >
        You are summarizing a group of standalone git commits. The work is already done
        (the commit is the delivery). Use CODE CHANGES (file path, class name, method
        name, lines added/removed) to describe what changed.
        Return JSON:
          {
            "deliveries":   ["delivery description referencing file/class/method"],
            "action_items": [{"desc": "...", "acceptance": "..."}],
            "status":       "completed",
            "ai_score":     5
          }
        status is always "completed" and ai_score is always 5 for commit entries.
        These items are auto-approved ([+]) — the user does not need to review them.
        Keep each item to one clear sentence.
      llm: claude-haiku-4-5-20251001
      temperature: 0.3

  items:
    cnt: 1
    grouping_prompt:
      desc: >
        You are grouping document or meeting items into topic clusters by use case.
        You receive: a numbered list of items (title + content), existing use case slugs,
        and the planner tag list for tag matching.
        Return a JSON array of groups (same schema as prompts grouping, including
        user_tags, ai_existing_tags, ai_new_tags fields).
        Each item is typically its own group unless two items clearly address the same topic.
      llm: claude-haiku-4-5-20251001
      temperature: 0.2
    summary_prompt:
      desc: >
        You are summarizing a document or meeting item.
        Extract and return JSON:
          {
            "requirements":  ["problem being addressed or decision made"],
            "deliveries":    ["decisions already finalised"],
            "action_items":  [{"desc": "...", "acceptance": "..."}],
            "status":        "completed|in-progress",
            "ai_score":      <0-5>
          }
        Summarize what problem it addresses, decisions made, and open action items.
      llm: claude-haiku-4-5-20251001
      temperature: 0.3

  messages:
    cnt: 20
    grouping_prompt:
      desc: >
        You are grouping Slack or chat messages into topic clusters by use case.
        You receive: a numbered list of messages, existing use case slugs,
        and the planner tag list for tag matching.
        Ignore off-topic small talk — assign those to slug "SKIP".
        Return a JSON array of groups (same schema as prompts grouping, including
        user_tags, ai_existing_tags, ai_new_tags fields).
      llm: claude-haiku-4-5-20251001
      temperature: 0.2
    summary_prompt:
      desc: >
        You are summarizing a cluster of Slack or chat messages about a single topic.
        Return JSON:
          {
            "requirements":  ["decision or requirement mentioned"],
            "deliveries":    ["anything already resolved in the conversation"],
            "action_items":  [{"desc": "...", "acceptance": "..."}],
            "status":        "completed|in-progress",
            "ai_score":      <0-5>
          }
        Extract only substantive decisions and action items. Ignore off-topic chat.
      llm: claude-haiku-4-5-20251001
      temperature: 0.3


# ── Step 4 merge configuration ────────────────────────────────────────────────
# Controls how approved entries map to planner_tags categories and seq ranges.
# No additional LLM call in this step — data comes from the Step 2 digest.

work_items:

  # Slug resolution order for an approved entry (first non-empty wins):
  #   1. user edits the [slug] directly in the backlog entry header
  #   2. slug from the grouping_prompt result
  #   3. "general" fallback
  slug_fallback: general

  # Similarity thresholds for duplicate slug detection (difflib.SequenceMatcher):
  #   ratio >= spelling_threshold  → treat as spelling duplicate, use existing slug
  #   ratio >= suggest_threshold   → warn user and suggest the existing slug
  spelling_threshold: 0.85
  suggest_threshold:  0.65

  # classify value → planner_tags category + seq counter key + display prefix
  #   use_case → UC10001, UC10002 …   (seq range 10000+)
  #   feature  → F20001,  F20002 …   (seq range 20000+)
  #   bug      → B30001,  B30002 …   (seq range 30000+)
  #   task     → F20001,  F20002 …   (shares feature range)
  classify_to_category:
    use_case: use_case   # UC 10000+
    feature:  feature    # F  20000+
    bug:      bug        # B  30000+
    task:     feature    # F  20000+

  # use_cases/*.md section routing:
  #   classify = bug          → ### Open Bugs
  #   classify = feature/task → ### Open Action Items
  #
  # The "## Events" section at the bottom of each file is system-managed.
  # It is rebuilt automatically from mem_backlog_links on refresh.
  # Do NOT edit it manually — changes will be overwritten on next refresh.


# ── Step 5 use case prompts ───────────────────────────────────────────────────
# These prompts are used when the user triggers a per-use-case update.
# Two modes:
#   refresh      — no LLM call; re-counts counters and re-copies raw event data
#   llm_summary  — full LLM rewrite of the use case summary, completed items, open items

use_cases:

  # refresh mode: counters + raw data copy only (no LLM)
  refresh:
    update_counters: true   # recalculate total_events from mem_backlog_links
    update_delivery: true   # re-scan linked commits for code stack + commit count
    update_events:   true   # rebuild ## Events section from mem_backlog_links

  # llm_summary mode: full AI rewrite using all events in the ## Events section
  llm_summary_prompt:
    desc: >
      You are updating a use case document from its raw event log.
      You receive the full ## Events section (all backlog entries that were approved
      into this use case) plus the current Summary and open items.

      Rewrite and return JSON:
        {
          "summary":     "2-4 sentence overview of what this use case covers and its current state",
          "requirements": ["key requirement 1", "key requirement 2"],
          "delivery": {
            "code_stack":    ["Python/FastAPI", "Vanilla JS"],
            "commits_count": <number>,
            "storage_paths": ["backend/memory/", "ui/frontend/views/"],
            "documents":     [{"name": "...", "type": "...", "path": "...", "summary": "..."}]
          },
          "completed_action_items": [
            {"date": "YY/MM/DD HH:MM", "summary": "...", "event_count": <n>}
          ],
          "completed_bugs": [
            {"date": "YY/MM/DD HH:MM", "summary": "...", "event_count": <n>}
          ],
          "open_action_items": [
            {"summary": "...", "acceptance": "...", "ai_score": <0-5>, "event_count": <n>}
          ],
          "open_bugs": [
            {"summary": "...", "acceptance": "...", "ai_score": <0-5>, "event_count": <n>}
          ]
        }

      AI score guide (open items):
        0 = not started (no events show progress)
        1 = discussed only
        2 = design decided, no code yet
        3 = partially implemented
        4 = implemented, not tested
        5 = done (but not yet moved to completed — still has open tasks)

      Be concise. One sentence per item. Reference file/class/method names where available.
    llm: claude-haiku-4-5-20251001
    temperature: 0.3


# ── Full-digest mode ──────────────────────────────────────────────────────────
# Triggered by: POST /memory/{project}/sync-backlog?mode=full
#
# Unlike the threshold-based mirroring_event_summary above (which processes N
# rows at a time), full_digest sees ALL pending data at once and produces a
# structured backlog with one item PER SOURCE EVENT:
#
#   • ALL pending prompts + standalone commits → grouped into at most max_groups
#     use case clusters (ONE grouping LLM call covering both types)
#   • Each prompt in the group → ONE backlog ITEM (P-series ref)
#   • Each standalone commit in the group → ONE backlog ITEM (C-series ref)
#   • Backlog.md written as GROUP sections (one per use case cluster):
#
#       YY/MM/DD-HH:MM [ ] (source) — slug
#       <!-- G_SLUG: discovery -->
#       <!-- G_TYPE: existing|new -->
#       Total: 5 prompts · 2 commits · 0 messages · 0 items
#       User tags: development
#       AI existing: [feature:backlog-pipeline] [phase:development]
#       AI new: [task:use-case-merge]
#
#         PROMPTS P100001 [ ] [task] [in-progress] [3] — summary
#           Requirements: req1; req2
#           Deliveries:   done1; done2
#
#         COMMITS C200001 [+] [task] [completed] [5] — commit summary
#           Deliveries:   file/class changed
#
#       ---
#
#       YY/MM/DD-HH:MM [ ] (source) — memory-architecture
#       ...
#
# Item approval fields:
#   [ ] = pending (prompt/item/message default)
#   [+] = approved (commits default; user approves prompts)
#   [-] = rejected (user rejects)
#
# Group-level [ ] controls use case creation for NEW slugs.
# Run POST /memory/{project}/work-items/sync to merge approved items into use_cases/*.md.

full_digest:
  max_groups: 7    # hard cap on use case clusters (merge minor topics)

  # ── Step A: group ALL events (prompts + commits) into use case clusters ──
  # One LLM call receives [P0], [P1], ..., [C0], [C1] ... labels.
  # Also receives the full planner_tags list (slug, category, description) for tag matching.
  # Returns prompt_indices + commit_indices per group + tag suggestions.
  grouping_prompt:
    desc: >
      You are grouping AI development events into use case clusters.
      Events are labeled [P0],[P1],... for prompt sessions and [C0],[C1],... for commits.
      Each cluster should share a single use case and dominant intent (bug/feature/task).
      You receive:
        1. A numbered list of event previews (each includes raw tags from event.tags JSON)
        2. Existing active use case slugs with descriptions
        3. All active planner_tags (id, name, category, description) for tag matching
      Group into AT MOST max_groups clusters (hard limit — merge related topics).
      Return a JSON array of groups:
        [{
          "slug": "auth-refactor",
          "slug_type": "existing|new",
          "classify": "bug|feature|task",
          "topic": "one-line group description (max 80 chars)",
          "prompt_indices": [0,1,2],
          "commit_indices": [3,7],
          "user_tags": ["development", "feature:auth"],
          "ai_existing_tags": [{"category": "feature", "name": "auth-refactor"}],
          "ai_new_tags": [{"category": "task", "name": "token-refresh"}]
        }]
      Rules:
        - Every event key (P0, C3, etc.) must appear in exactly one group.
        - Prefer existing slugs. Only create new slug if topic is truly novel.
        - New slugs must be lowercase-hyphenated (e.g. "stripe-billing").
        - classify = dominant intent across events in the group.
        - Merge minor topics (1-3 events) into the closest related group.
        - Commits touching only CLAUDE.md/MEMORY.md/package-lock.json etc: slug "SKIP".
        - user_tags: collect all unique tag values from event.tags fields in the group.
        - ai_existing_tags: max 1 per category; must exactly match an existing planner tag name.
        - ai_new_tags: max 1 per category; only suggest if no existing tag fits; lowercase-hyphenated.
    llm: claude-haiku-4-5-20251001
    temperature: 0.2

  # ── Step B: batch-summarize prompts in each group (ONE LLM call per group) ──
  # Returns an ARRAY of per-event summaries aligned with input order.
  summary_prompt:
    desc: >
      You are summarizing AI development session prompts individually.
      Each event includes a prompt, assistant response, and optionally linked git
      commits with code symbols (file/class/method/lines added/removed).
      Return a JSON ARRAY with one element per event (same order as input):
      [
        {
          "event_index": 0,
          "summary":      "one-line description max 100 chars",
          "classify":     "bug|feature|task",
          "requirements": ["user request 1"],
          "deliveries":   ["what was done referencing file/class/method"],
          "action_items": [{"desc": "...", "acceptance": "done when ..."}],
          "status":       "completed|in-progress",
          "ai_score":     <0-5>
        }
      ]
      status: "completed" if all action items are resolved, "in-progress" otherwise.
      ai_score: 0=not started, 1=discussed, 2=design, 3=partial, 4=implemented, 5=tested.
      One sentence per item. Be specific: reference file/class/method names.
      If no LINKED COMMIT sections appear, deliveries = assistant-described work only.
      requirements = what the user asked for. action_items = open/in-progress tasks.
    llm: claude-haiku-4-5-20251001
    temperature: 0.3

  # ── Step C: batch-summarize standalone commits per group (ONE call per group) ──
  # Returns an ARRAY of per-commit summaries aligned with input order.
  # Commits always get status="completed" and ai_score=5 (work already done).
  commits_batch_summary_prompt:
    desc: >
      You are summarizing standalone git commits individually (no linked user session —
      CI/CD, merges, direct pushes). The work is already done.
      Use commit messages and code symbols (file/class/method/lines) to describe
      what changed for each commit.
      Return a JSON ARRAY with one element per commit (same order as input):
      [
        {
          "event_index": 0,
          "summary":   "one-line description max 100 chars",
          "classify":  "bug|feature|task",
          "deliveries": ["what was changed referencing file/class/method"],
          "status":    "completed",
          "ai_score":  5
        }
      ]
      status is always "completed" and ai_score is always 5 for commit entries.
      One sentence per item. Be specific: file/class/method names where available.
