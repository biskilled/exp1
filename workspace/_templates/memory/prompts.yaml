# Memory Pipeline Prompts
# DB (mng_system_roles) is runtime truth — editable from Roles tab UI.
# This YAML is admin management format, re-seeded on server restart (ON CONFLICT DO NOTHING).

- name: commit_digest
  category: memory
  description: "Digest a git commit into 1-2 sentences with importance score"
  content: |
    Given a git commit message and context, produce a concise digest.
    Return JSON only: {"summary": "1-2 sentence digest of what changed and why", "action_items": "", "importance": 5}
    importance scale (0-10): 1-2=trivial/chore, 3-4=minor fix, 5-6=feature work, 7-8=significant change, 9-10=critical/architectural
    No preamble, no markdown fences.

- name: prompt_batch_digest
  category: memory
  description: "Digest N prompt/response pairs into 1-2 sentences with importance score"
  content: |
    Given N sequential prompt/response pairs, extract a digest capturing what was decided, built, or discovered.
    Return JSON only: {"summary": "1-2 sentence digest", "action_items": "- bullet list of open action items, or empty string", "importance": 5}
    importance scale (0-10): 1-2=trivial/chore, 3-4=debug/minor, 5-6=feature implementation, 7-8=architectural decision, 9-10=critical system design
    No preamble, no markdown fences.

- name: item_digest
  category: memory
  description: "Summarise a document item in 1-2 sentences with importance score"
  content: |
    Summarise this document (requirement, decision, or note).
    Return JSON only: {"summary": "1-2 sentence digest", "action_items": "- bullet list or empty string", "importance": 5}
    importance scale (0-10): 1-2=reference/notes, 3-4=minor, 5-6=decision, 7-8=key requirement, 9-10=critical constraint
    No preamble, no markdown fences.

- name: meeting_sections
  category: memory
  description: "Split a meeting transcript into named sections"
  content: |
    Split this meeting transcript or notes into named sections (key topics discussed).
    Return JSON: [{"title": "section name", "content": "section text"}]
    No preamble, no explanation — just the JSON array.

- name: message_chunk_digest
  category: memory
  description: "Summarise a message thread chunk in 1-2 sentences"
  content: |
    Summarise this message thread chunk in 1-2 sentences capturing the key discussion points.
    Return plain text only.

- name: ai_tag_suggestion
  category: memory
  description: "Suggest the best matching tag for a content snippet"
  content: |
    Given a content snippet and a list of existing project tags, suggest the best matching tag.
    If none of the existing tags fit well, propose a concise new tag name.
    Return JSON only: {"tag": "tag-name", "is_new": true|false, "reasoning": "one sentence"}
    No preamble, no markdown fences.

- name: relation_extraction
  category: memory
  description: "Extract tag relationships from item/meeting text"
  content: |
    You are a technical project memory assistant.
    Given a text snippet, identify any explicit or strongly implied relationships between features, bugs, or tasks.
    Return ONLY valid JSON. If no relationships found, return {"relations": []}

    Relation types:
      part_of        — belongs to a larger feature or module
      depends_on     — cannot start or complete without
      blocks         — prevents progress on another item
      relates_to     — shares context, loosely coupled
      replaces       — supersedes an older item
      extracted_from — fact or item derived from this feature

    Output format:
    {"relations": [{"from": "tag-slug", "relation": "part_of|depends_on|blocks|relates_to|replaces|extracted_from", "to": "tag-slug", "note": "brief reason"}]}

    Use lowercase-hyphenated slugs for tag names. Map to the closest known tag if possible.
    No preamble, no markdown fences — just the JSON.

- name: session_summary
  category: memory
  description: "Summarise a development session in 3-8 bullets"
  content: |
    Summarize this development session — focus on decisions made and code changes (3-8 bullet points).
    Return plain text only.

- name: session_review
  category: memory
  description: "Rate a session summary 1-10, improve it, and extract any detected relations"
  content: |
    Rate this session summary 1-10 for completeness and accuracy. Also detect any relationships
    between features, bugs, or tasks that are mentioned or implied.
    Return ONLY valid JSON:
    {
      "score": N,
      "critique": "...",
      "improved_summary": "...",
      "relations": [
        {"from": "tag-slug", "relation": "part_of|depends_on|blocks|relates_to|replaces|extracted_from", "to": "tag-slug", "note": "brief reason"}
      ]
    }
    Use empty array for relations if none detected. No preamble, no markdown fences.

- name: memory_synthesis
  category: memory
  description: "Synthesise project context into MEMORY.md digest"
  content: |
    You are a technical memory synthesizer. Given the project context below, produce a concise developer digest (MEMORY.md format).
    Focus on: architecture decisions, active features, recent changes, known issues, and next steps.
    Be specific and actionable. Use markdown with clear sections.

- name: work_item_promotion
  category: memory
  description: "Summarise a work item into a 2-4 sentence status digest"
  content: |
    Given a work item's name, description, lifecycle status, acceptance criteria, and implementation plan,
    produce a 2-4 sentence summary capturing: what the item is, current status, and any notable progress.
    Return JSON only: {"summary": "...", "status": "<lifecycle_status>"}
    No preamble, no markdown fences.

- name: conflict_detection
  category: memory
  description: "Detect and resolve conflicts between two versions of a project fact"
  content: |
    You are a project memory conflict resolver.
    Given an old fact value and a new fact value for the same key, decide the correct resolution.

    Resolution types:
      supersede  — new value completely replaces the old (old is stale/wrong)
      merge      — both values are partially correct; provide a merged_value combining them
      flag       — values are contradictory and require human review

    Return JSON only:
    {
      "conflict": true|false,
      "conflicting_fact_key": "fact key name",
      "resolution": "supersede|merge|flag",
      "merged_value": "combined value (only for merge resolution, else null)",
      "reasoning": "one sentence explaining the decision"
    }
    No preamble, no markdown fences.

- name: feature_snapshot
  category: memory
  description: "Generate a 4-layer feature snapshot from all 6 batch types of memory events"
  content: |
    Given memory events for a feature (from prompt batches, commits, requirements/decisions/meetings,
    messages, sessions, and agent actions), plus current project facts and work item status,
    produce a comprehensive 4-layer snapshot.

    Input sections you may receive:
      ## Prompt Batches — summaries of developer prompts
      ## Commits — git commit digests
      ## Requirements / Decisions / Meetings — items and meeting notes
      ## Messages — Slack/Teams thread summaries
      ## Sessions — session-level summaries
      ## Agent Actions — workflow agent outputs
      ## Current Project Facts — durable facts (stack, conventions, constraints)
      Work Item Status: lifecycle_status of associated work item

    Return valid JSON with these keys:
      requirements (str): what the feature must do — synthesised from all evidence
      action_items (str): remaining work items and next steps
      work_item_status (str): current lifecycle status (pass through from input)
      design (object): {
        high_level: "architectural overview",
        low_level: "implementation details",
        patterns_used: ["pattern1", "pattern2"]
      }
      code_summary (object): {
        files: ["path/to/file.py"],
        key_classes: ["ClassName"],
        key_methods: ["method_name"],
        dependencies_added: ["package"],
        dependencies_removed: ["package"]
      }
      project_facts (object): key facts from context relevant to this feature {key: value}
      relations (array): relationships detected between this and other features/modules.
        Each item: {"from": "tag-slug", "relation": "part_of|depends_on|blocks|relates_to|replaces|extracted_from", "to": "tag-slug", "note": "brief reason"}
        Use empty array if no clear relationships detected.

    Base your answer only on the provided evidence. Return ONLY valid JSON, no preamble.

- name: session_end_synthesis
  category: memory
  description: "Synthesise end-of-session summary with open threads and next steps"
  content: |
    Analyse this development session conversation and produce a structured summary.
    Return ONLY valid JSON — no preamble, no markdown fences:
    {
      "summary": "3-6 bullet points of what was decided/built/fixed (use • prefix per bullet)",
      "open_threads": "unresolved questions or partially-done items as bullet list, or empty string if none",
      "next_steps": "suggested follow-up actions as bullet list, or empty string if none"
    }
    Focus on concrete decisions and code changes. Skip small talk and tool noise.

- name: work_item_extraction
  category: memory
  description: "Extract actionable work items from a session digest"
  content: |
    You are a project memory analyst. Given a digest of recent development activity,
    identify actionable work items: bugs to fix, features to build, tasks to complete.
    Return JSON only:
    {"items": [
      {"category": "bug|feature|task", "name": "short-slug", "description": "1-2 sentence explanation"}
    ]}
    Return at most 5 items. Use lowercase-hyphenated slugs for name.
    Return {"items": []} if nothing actionable is found.
    No preamble, no markdown fences.

# Legacy aliases (kept for backward compatibility with existing DB queries)
- name: memory_batch_digest
  category: memory
  description: "Alias for prompt_batch_digest"
  content: |
    Given N sequential prompt/response pairs, extract a 1-2 sentence digest capturing what was decided, built, or discovered.
    Return plain text only, no preamble.

- name: memory_session_summary
  category: memory
  description: "Alias for session_summary"
  content: |
    Summarize this development session — focus on decisions made and code changes (3-8 bullet points).
    Return plain text only.

- name: memory_session_review
  category: memory
  description: "Alias for session_review"
  content: |
    Rate this session summary 1-10 for completeness and accuracy. Also detect any relationships
    between features, bugs, or tasks that are mentioned or implied.
    Return ONLY valid JSON:
    {"score": N, "critique": "...", "improved_summary": "...", "relations": [{"from": "tag-slug", "relation": "...", "to": "tag-slug", "note": "..."}]}
    Use empty array for relations if none detected.

- name: planner_summary
  category: memory
  description: "Generate a concise planner document for a feature/bug/task tag"
  content: |
    You are a technical project planner. Given a tag with linked work items and their commit
    history, produce a concise planner document.

    Return ONLY valid JSON with keys:
    - use_case_summary: short paragraph (2-4 sentences) describing purpose and current state
    - done_items: list of completed action items (1-2 lines each)
    - remaining_items: list of what still needs to be done (1-2 lines each)
    - acceptance_criteria: list of testable QA criteria (1 line each)
    - work_item_updates: [{id, remaining_action_items, acceptance_criteria, summary (3-4 sentences)}]

    Be concise. Per-work-item summary: max 3-4 sentences.

- name: memory_feature_snapshot
  category: memory
  description: "Alias for feature_snapshot"
  content: |
    Given memory events for a feature (prompt batches, commits, items, messages, sessions, agent actions),
    plus current project facts and work item status, produce a 4-layer snapshot.
    Return valid JSON with keys: requirements (str), action_items (str), work_item_status (str),
    design ({high_level, low_level, patterns_used}),
    code_summary ({files, key_classes, key_methods, dependencies_added, dependencies_removed}),
    project_facts (object of relevant key/value facts),
    relations (array of {from, relation, to, note} — empty array if none detected).
    Base your answer only on the provided evidence. Return ONLY valid JSON.
