# _providers.yaml — AI tool and API provider context file mapping
#
# This YAML is the single source of truth for:
#   1. Memory file generation  — drives write_root_files() in memory_files.py
#   2. Project creation setup  — shows which templates to render into code_dir
#
# Content tiers:
#   full    — CLAUDE.md-depth context (code hotspots, all facts, recent changes)
#   compact — cursor/rules.md-depth  (stack, conventions, active features only, ≤2000 tokens)
#
# Copy logic in write_root_files():
#   source: claude_code  → copy memory/claude/CLAUDE.md to code_dir/<copy_to_code_dir>
#   source: cursor       → copy memory/cursor/rules.md to code_dir/<copy_to_code_dir>
#   (null)               → file generated separately, not a simple copy

cli_tools:
  - id: claude_code
    name: "Claude Code"
    description: "Anthropic Claude Code CLI — reads CLAUDE.md from project root"
    tier: full
    memory_file: claude/CLAUDE.md      # generated in memory/
    copy_to_code_dir: CLAUDE.md        # destination relative to code_dir
    mcp_template: _mcp.json            # template rendered to code_dir/.mcp.json
    mcp_dest: .mcp.json

  - id: gemini_cli
    name: "Gemini CLI"
    description: "Google Gemini CLI — reads GEMINI.md from project root"
    tier: full
    source: claude_code                # same content as claude_code (no separate render)
    memory_file: claude/CLAUDE.md      # read from this memory file
    copy_to_code_dir: GEMINI.md        # different filename in code_dir
    mcp_template: null                 # Gemini CLI MCP is global-only (~/.gemini/settings.json)

  - id: codex_cli
    name: "OpenAI Codex CLI"
    description: "OpenAI Codex CLI — reads AGENTS.md from project root"
    tier: full
    source: claude_code                # same content as claude_code
    memory_file: claude/CLAUDE.md
    copy_to_code_dir: AGENTS.md
    mcp_template: _codex.toml         # template rendered to code_dir/.codex/config.toml
    mcp_dest: .codex/config.toml

  - id: cursor
    name: "Cursor"
    description: "Cursor IDE — reads .cursorrules and .cursor/rules/*.mdrules"
    tier: compact
    memory_file: cursor/rules.md       # generated in memory/
    copy_to_code_dir: .cursorrules     # legacy root file (Cursor still reads this)
    mcp_template: _mcp.json
    mcp_dest: .cursor/mcp.json

  - id: copilot
    name: "GitHub Copilot"
    description: "GitHub Copilot — reads .github/copilot-instructions.md"
    tier: compact
    source: cursor                     # same compact content as cursor
    memory_file: cursor/rules.md
    copy_to_code_dir: .github/copilot-instructions.md
    mcp_template: null                 # Copilot does not support MCP

  - id: opencode
    name: "OpenCode"
    description: "OpenCode AI CLI — reads instructions from opencode.json"
    tier: compact
    source: cursor                     # same compact content
    memory_file: cursor/rules.md
    copy_to_code_dir: null             # instructions embedded in opencode.json
    mcp_template: _opencode.json      # template rendered to code_dir/opencode.json
    mcp_dest: opencode.json

api_providers:
  # All API providers share one system prompt file (compact tier).
  # Pass as the `system` parameter in API calls.
  # File: memory/api/system_prompt.md

  - id: claude_api
    name: "Claude API"
    description: "Anthropic Claude API (claude-opus-*, claude-sonnet-*, etc.)"
    system_prompt_file: api/system_prompt.md

  - id: openai_api
    name: "OpenAI API"
    description: "OpenAI GPT-4o, o1, o3, etc."
    system_prompt_file: api/system_prompt.md

  - id: gemini_api
    name: "Gemini API"
    description: "Google Gemini API (gemini-2.0-flash, gemini-1.5-pro, etc.)"
    system_prompt_file: api/system_prompt.md
    note: "For large-context tasks, also upload memory/code.md via the Files API"

  - id: grok_api
    name: "Grok API"
    description: "xAI Grok API (grok-3, etc.)"
    system_prompt_file: api/system_prompt.md

  - id: deepseek_api
    name: "DeepSeek API"
    description: "DeepSeek API (deepseek-chat, deepseek-reasoner)"
    system_prompt_file: api/system_prompt.md
