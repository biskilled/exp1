name: ui_builder
description: "Design UI component → Implement → Visual review"
max_iterations: 2

steps:
  - name: design
    provider: claude
    prompt: prompts/01_design.md
    inject_input: true
    inject_files:
      - PROJECT.md
    inject_context: [memory]

  - name: implement
    provider: claude
    prompt: prompts/02_implement.md
    inject_previous_output: true
    inject_files:
      - "{{code_dir}}/src/components/"
      - auto

  - name: review
    provider: deepseek
    prompt: prompts/03_review.md
    inject_previous_output: true
    output_format: json
    produces:
      score: int
      approved: bool
    on_fail:
      loop_to: implement
    on_pass:
      next: end

stop_condition:
  type: score
  field: score
  threshold: 8
