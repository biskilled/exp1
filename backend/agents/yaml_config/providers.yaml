# LLM provider and model configuration — single source of truth.
# Edit this file to add/remove providers or models.
# Loaded at runtime by GET /agent-roles/providers (no auth required).
# Supported provider ids must match what agents/providers/ modules accept.

providers:
  - id: claude
    label: "Claude API"
    description: "Anthropic Claude via direct API (recommended)"
    models:
      - claude-opus-4-6
      - claude-sonnet-4-6
      - claude-haiku-4-5-20251001

  - id: claude_sdk
    label: "Claude SDK"
    description: "Claude Code as subprocess — inherits CLAUDE.md, local tools, session compression"
    models:
      - claude-opus-4-6
      - claude-sonnet-4-6
      - claude-haiku-4-5-20251001

  - id: openai
    label: "OpenAI API"
    description: "OpenAI GPT and reasoning models via API"
    models:
      - gpt-4o
      - gpt-4o-mini
      - gpt-4-turbo
      - o1
      - o3-mini

  - id: codex_sdk
    label: "Codex SDK"
    description: "OpenAI Codex CLI as subprocess — auto context compression, open-source Rust"
    models:
      - codex-mini-latest
      - o4-mini
      - o3

  - id: deepseek
    label: "DeepSeek Cloud"
    description: "DeepSeek hosted API (api.deepseek.com)"
    models:
      - deepseek-chat
      - deepseek-coder
      - deepseek-reasoner

  - id: deepseek_api
    label: "DeepSeek API"
    description: "DeepSeek self-hosted or any OpenAI-compatible endpoint"
    models:
      - deepseek-chat
      - deepseek-coder

  - id: gemini
    label: "Gemini API"
    description: "Google Gemini models via API"
    models:
      - gemini-2.0-flash
      - gemini-1.5-pro
      - gemini-1.5-flash

  - id: grok
    label: "Grok API"
    description: "xAI Grok models via API"
    models:
      - grok-3-latest
      - grok-2-latest

  - id: ollama
    label: "Ollama"
    description: "Local models via Ollama (self-hosted, no API key)"
    models:
      - llama3
      - mistral
      - codellama
      - qwen2.5
