# work_items.yaml — Classification prompt + category config for the work items pipeline.
#
# ── TRIGGER ──────────────────────────────────────────────────────────────────
# Manual only (default mode):
#   POST /wi/{project}/classify          — run classification now (sync)
#   POST /wi/{project}/classify?background=true — async, returns immediately
#
# Auto-threshold (opt-in via project.yaml → work_items.classification.mode=threshold):
#   Triggered from route_git.py + route_chat.py after each commit/prompt.
#   Threshold per source: prompts=2000 tokens, commits=1000, messages=5000, items=500.
#   Configure in project.yaml:
#     work_items:
#       classification:
#         mode: threshold
#         thresholds: {prompts: 50, commits: 20}
#
# ── FULL FLOW ─────────────────────────────────────────────────────────────────
# 1. classify() deletes all AI-temp draft rows (wi_id LIKE 'AI%') from mem_work_items
# 2. Fetches all unprocessed events (wi_id IS NULL) from mem_mrr_* tables (max 200/100/50)
# 3. Groups events into token-bounded batches (~6000 tokens each)
# 4. For each batch: calls Claude Haiku with this prompt → returns flat JSON array
# 5. Saves results as draft rows: use_cases first (wi_id=AI0001), then children
#    with wi_parent_id → UUID of their parent use_case row (wi_id=AI0002, AI0003 …)
# 6. User reviews in UI (GET /wi/{project}/pending/grouped → use_cases + children nested)
# 7. User approves → use_case gets US0001, child gets BU/FE/TA/PO/RE real ID
#    → approved items: mem_mrr_* rows tagged with real wi_id, embedding computed,
#      planner_tag upserted, MD file written to documents/use_cases/{slug}.md
# 8. User rejects → wi_id set to REJxxxxxx (events stay unlinked for next run)
# 9. POST /wi/{project}/reset — deletes all AI drafts + resets mem_mrr_* wi_id=NULL
#
# ── TABLES ───────────────────────────────────────────────────────────────────
# READ (events to classify):
#   mem_mrr_prompts       wi_id IS NULL → up to 200 rows
#   mem_mrr_commits       wi_id IS NULL → up to 100 rows
#   mem_mrr_messages      wi_id IS NULL → up to 50 rows
#   mem_mrr_items         wi_id IS NULL → up to 50 rows
#
# WRITE (draft classification):
#   mem_work_items        wi_id=AI0001… (draft), wi_parent_id links children to use_case
#                         wi_id=US/BU/FE/TA/PO/RE after approval
#                         wi_id=REJxxxxxx after rejection
#
# WRITTEN on approval:
#   mem_mrr_*             wi_id set to real ID (marks events as processed)
#   planner_tags          upserted (name, category_id, description, parent_id)
#   mem_work_items        embedding VECTOR(1536) computed via OpenAI
#   documents/use_cases/  {slug}.md written/refreshed on use_case approval
#
# SEQUENCES (pr_seq_counters per project):
#   WI_AI → AI0001…  (draft temp IDs, reset each classify run)
#   WI_US → US0001…  (approved use cases)
#   WI_FE → FE0001…  (approved features)
#   WI_BU → BU0001…  (approved bugs)
#   WI_TA → TA0001…  (approved tasks)
#   WI_PO → PO0001…  (approved policies)
#   WI_RE → RE6001…  (approved requirements)
#
# ── LLM ──────────────────────────────────────────────────────────────────────
# Model:  Claude Haiku (claude-haiku-4-5-20251001)
# Max tokens per call: 4000
# Cost logged to: mng_usage_logs (source='memory')
#
# ── FILE HOTSPOT CONTEXT ──────────────────────────────────────────────────────
# When a commit touches files with a high hotspot score, a [FILE HOTSPOTS] block
# is injected into the classification prompt for that commit. This helps the LLM
# flag commits as bugs or high-importance tasks when they touch risky files.
#
# Tables (populated by memory_code_parser.py after each commit):
#
#   mem_file_stats  — one row per (project, file_path), updated after every commit:
#     commit_count      how many commits have touched this file
#     change_count      total symbol-level line changes (added + removed) across all commits
#     bug_commit_count  commits whose message matched: fix|bug|error|crash|hotfix|revert|…
#     revert_count      commits whose message matched: revert|rollback
#     current_lines     line count of the file at the last seen commit
#     author_count      distinct authors who committed this file (approximated)
#     lines_added/removed  cumulative totals
#     hotspot_score     = commit_count + 2 if current_lines ≥ 800 else 0
#                         (frequency + large-file bonus; recomputed from stored totals
#                          after every upsert — not a per-commit delta)
#
#   mem_file_coupling — one row per sorted (file_a, file_b) pair per project:
#     co_change_count   how many commits touched both files at the same time
#     (files that always change together are likely tightly coupled)
#
# API:
#   GET /wi/{project}/file-hotspots                    — top N by score
#   GET /wi/{project}/file-hotspots?file_path=auth.py  — single file + coupled files
#   Python: get_file_hotspots(pid, min_score, limit, file_paths)  in memory_code_parser.py
#
# ── KEY FILES ─────────────────────────────────────────────────────────────────
# backend/memory/memory_work_items.py  — full pipeline logic
# backend/memory/memory_code_parser.py — tree-sitter parser + file hotspot tracking
# backend/routers/route_work_items.py  — API endpoints (prefix: /wi)
# ui/frontend/views/work_items.js      — Planner UI (approval, stats, MD editor)
# ui/frontend/utils/api.js             — api.wi.* calls

classification:
  max_use_cases: 8   # default target use case limit; overridable via ?max_use_cases=N query param
  system: |
    You are a senior software architect. Your job is to classify development events
    (prompts, commits, messages) into structured work items grouped by use case.

    RULES:
    - Every output must be a flat JSON array
    - First item(s): one or more "use_case" entries (item_level=3)
    - Following items: children (item_level=2) referencing their parent use_case by name
    - Match to EXISTING use cases when the topic clearly belongs to one (use exact name + existing_wi_id)
    - If no existing use case matches, suggest a new one (existing_wi_id: null)
    - wi_type for children: bug|feature|task|policy|requirement
      - requirement: events contain specs/designs/user stories but NO deliveries yet
      - score_status=0 → always wi_type="requirement"
      - score_status=1-4 → in_progress (feature/bug/task)
      - score_status=5 → done
    - Each child item MUST specify which subset of mrr_ids it covers
    - deliveries: empty string if nothing was shipped yet
    - Return ONLY the JSON array — no markdown, no prose

    SCORING:
    - score_importance (0-5): how critical is this work item?
        0 = trivial / cosmetic  1 = nice-to-have  2-3 = normal  4 = important  5 = critical / blocking
    - score_status (0-5): how complete is it?
        0 = not started / requirement only  1-2 = early  3-4 = in progress  5 = done

    USER TAG PRIORITY:
    When an event has a "feature" tag (e.g. feature:"auth-refactor") or "bug" tag,
    this is the STRONGEST signal for which use case it belongs to. Always prefer
    an existing use case whose name or wi_id matches the tag value over creating a new one.

    FILE HOTSPOT SIGNALS (if present in event block):
    A [FILE HOTSPOTS] block after a commit means those files are frequently changed
    and/or involved in bug fixes. Use this to:
    - Raise score_importance for items touching hotspot files
    - Prefer wi_type="bug" if bug_commits is high for a changed file
    - Mention the file's risk in the item summary

  event_prompt: |
    # Existing Approved Use Cases
    {existing_context}

    # Events to Classify
    {events_block}

    Return a flat JSON array. Use cases first, then children:
    [
      {
        "wi_type": "use_case",
        "item_level": 3,
        "name": "<use case name>",
        "existing_wi_id": "<WI_ID of existing approved use case, or null>",
        "summary": "<one paragraph: what this use case covers>",
        "mrr_ids": {"prompts":[],"commits":[],"messages":[],"items":[]}
      },
      {
        "wi_type": "bug|feature|task|policy|requirement",
        "item_level": 2,
        "name": "<title under 60 chars>",
        "existing_wi_id": "<WI_ID of existing approved item, or null>",
        "suggested_parent_name": "<exact name of the use_case above>",
        "summary": "<requirement / user story / bug description>",
        "deliveries": "<what was actually done, empty if nothing yet>",
        "delivery_type": "backend|frontend|fullstack|documents|config|tests|",
        "score_importance": 0,
        "score_status": 0,
        "mrr_ids": {"prompts":[],"commits":[],"messages":[],"items":[]}
      }
    ]

categories:
  use_case:    {color: "#06b6d4", icon: "◻",  seq_prefix: "US", seq_key: "WI_US"}
  feature:     {color: "#22c55e", icon: "⚡", seq_prefix: "FE", seq_key: "WI_FE"}
  bug:         {color: "#ef4444", icon: "🐛", seq_prefix: "BU", seq_key: "WI_BU"}
  task:        {color: "#3b82f6", icon: "✓",  seq_prefix: "TA", seq_key: "WI_TA"}
  policy:      {color: "#8b5cf6", icon: "⚑", seq_prefix: "PO", seq_key: "WI_PO"}
  requirement: {color: "#f59e0b", icon: "◎",  seq_prefix: "RE", seq_key: "WI_RE"}

summarise:
  active: true
  system: |
    You are a technical product manager reorganising a use case's work items.
    Given the use case name, current summary, and all work items (open and closed):

    1. Write an updated summary (2-4 sentences) that reflects both completed and open work
    2. Return ALL items split into two groups:
       - "in_progress": items with status < 5 (not done), sorted by urgency:
         bugs first (most critical), then features, then tasks/policies/requirements.
         Within each type, sort by inferred importance (most critical first).
       - "completed": items with status >= 5 (done), sorted by type (bugs, features, tasks)
    Each list entry is just: {"id": "...", "priority": N} (1-based rank within the group).
    Include ALL item IDs from the input — do not omit any.

    Return ONLY valid JSON with no markdown fences:
    {"new_summary": "...", "in_progress": [...], "completed": [...]}

  user_prompt: |
    Use Case: {name}
    Current Summary: {summary}

    Items:
    {items_json}
