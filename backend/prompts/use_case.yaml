# use_case.yaml — Use case document prompts
#
# Prompts used when generating or refreshing use case summaries.
# These are separate from the backlog pipeline prompts (backlog.yaml).
#
# Loaded by: memory_backlog.py _use_case_cfg()
# Used by:
#   - POST /memory/{project}/use-case/{slug}/llm-summary
#   - Group-level summary generation in _build_commits_group()

# ── Group summary (generated per group during full-digest) ───────────────────
# Input: group topic + aggregated requirements + deliveries from all items.
# Used to write the > Summary: line in backlog.md.
group_summary:
  desc: >
    You are writing a concise summary paragraph for a use case group.
    You receive the group topic and a list of all events (requirements and deliveries).
    Write a 2-3 sentence summary that describes:
      1. What problem or goal this use case addresses
      2. What has been done (key deliveries)
      3. What is still in progress (if any)
    Be specific: mention file names, module names, or feature names where relevant.
    Return only the summary text (no JSON, no markdown, no quotes).
  llm: claude-haiku-4-5-20251001
  temperature: 0.3
  max_tokens: 300

# ── Full LLM rewrite of a use case document ──────────────────────────────────
# Input: all approved events from the ## Events section + current document content.
# Returns structured JSON to rewrite the document sections.
llm_summary:
  desc: >
    You are updating a use case document from its approved event log.
    You receive:
      - The current use case document (Summary, Requirements, and all event blocks)
      - Each event block contains: source type, ref_id, summary, requirements,
        deliveries, action_items, status, and AI score
    Synthesise ALL events into a comprehensive document update. Return JSON:
    {{
      "summary": "3-5 sentence overview covering: what this use case is, current state,
                  key technologies/files involved, and next steps",
      "requirements": [
        "complete list of user requirements extracted from all events (de-duplicated)"
      ],
      "delivery": {{
        "code_stack":    ["Python/FastAPI", "Vanilla JS / HTML"],
        "commits_count": <total commit count from events>,
        "storage_paths": ["backend/memory/", "ui/frontend/views/"],
        "documents":     [{{"name": "...", "type": "api|component|module", "path": "...", "summary": "one line"}}]
      }},
      "completed_items": [
        {{"date": "YY/MM/DD", "summary": "what was completed", "classify": "bug|feature|task", "ai_score": 5}}
      ],
      "open_items": [
        {{"summary": "what still needs to be done", "classify": "bug|feature|task",
          "acceptance": "done when ...", "ai_score": <0-4>}}
      ]
    }}
    AI score guide:
      0 = not started, 1 = discussed, 2 = design decided, 3 = partially coded,
      4 = implemented (untested), 5 = done and verified
    completed_items: items where status="completed" or ai_score=5 across events.
    open_items: items where status="in-progress" or ai_score < 5, sorted by ai_score desc.
    Be specific: reference file/class/method names. One sentence per item.
    De-duplicate: merge near-identical requirements and deliveries.
  llm: claude-haiku-4-5-20251001
  temperature: 0.3
  max_tokens: 4000

# ── Refresh mode (no LLM — counter + events rebuild only) ────────────────────
refresh:
  update_counters: true
  update_delivery: true
  update_events:   true
