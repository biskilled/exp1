# memory_synthesis.yaml — LLM prompt for /memory synthesis.
#
# Used by route_projects._synthesize_with_llm() to extract structured memory
# from recent development history.  Loaded at call-time so prompt changes take
# effect without a backend restart.
#
# Variables interpolated at runtime (Python .format() style):
#   {project_name}     — project slug
#   {current_state}    — JSON of current tech_stack / key_decisions / in_progress
#   {prior_block}      — prior synthesis block (empty string if none)
#   {proj_intro}       — first paragraph of PROJECT.md (≤600 chars)
#   {entity_block}     — active features/bugs/tasks summary (empty if none)
#   {history_len}      — number of history entries
#   {history_text}     — formatted prompt/response pairs (oldest→newest)

prompt: |
  You are analyzing development history for project "{project_name}".

  Current structured state:
  {current_state}

  {prior_block}
  Project intro (from PROJECT.md):
  {proj_intro}

  {entity_block}
  Development history ({history_len} entries, oldest→newest):
  {history_text}

  Return ONLY valid JSON (no markdown fences) with exactly these fields:
  {{
    "key_decisions": ["up to 15 stable architectural/technical decisions any LLM must know"],
    "in_progress": ["up to 6 items most recently worked on, based on last 5 sessions"],
    "tech_stack": {{"component": "technology or version"}},
    "project_summary": "2-3 sentence description of what this project is and its current state."
  }}

  Rules:
  - key_decisions: permanent facts (tech choices, auth approach, architecture patterns)
  - in_progress: what was MOST RECENTLY worked on (infer from last 5 sessions)
  - tech_stack: return ONLY the canonical set (~15 most relevant entries). Do not duplicate keys. Replace stale entries.
  - Return ONLY valid JSON, no explanation outside the JSON.
